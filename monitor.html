<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Esame — Bioinformatica</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f5f0; color: #1a1a1a; }
  #site-header { background: #fff; border-bottom: 1px solid #ddd; padding: 12px 32px; }
  #site-header img { height: 52px; display: block; }
  #login-panel { max-width: 420px; margin: 60px auto; padding: 40px; background: #fff; border: 1px solid #ddd; }
  h1 { font-size: 1.3em; font-weight: bold; margin-bottom: 6px; }
  .subtitle { color: #555; font-size: 0.9em; margin-bottom: 28px; }
  label { display: block; font-size: 0.88em; color: #333; margin-bottom: 4px; margin-top: 14px; }
  input[type=password] { width: 100%; padding: 8px 10px; border: 1px solid #bbb; font-size: 1em; font-family: inherit; }
  .btn { display: inline-block; margin-top: 16px; padding: 9px 26px; background: #1a1a1a; color: #fff; border: none; font-size: 0.95em; font-family: inherit; cursor: pointer; }
  .btn:hover { background: #333; }
  .btn-sm { padding: 5px 14px; font-size: 0.82em; margin-top: 0; }
  .btn-outline { background: #fff; color: #1a1a1a; border: 1px solid #1a1a1a; }
  .btn-outline:hover { background: #f5f5f0; }
  #login-error { color: #b00; font-size: 0.85em; margin-top: 10px; min-height: 1em; }

  #monitor-panel { display: none; max-width: 1100px; margin: 30px auto; padding: 0 16px 60px; }
  #monitor-panel.active { display: block; }

  .monitor-header { background: #fff; border: 1px solid #ddd; padding: 18px 24px; margin-bottom: 14px;
                    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .monitor-header h2 { font-size: 1.1em; }
  .monitor-meta { font-size: 0.85em; color: #555; margin-top: 4px; }

  /* Track selector in monitor */
  .track-bar { background: #fff; border: 1px solid #ddd; padding: 14px 24px; margin-bottom: 14px;
               display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .track-bar select { flex: 1; min-width: 200px; padding: 7px 10px; border: 1px solid #bbb;
                      font-size: 0.92em; font-family: inherit; background: #fff; }

  .stats-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .stat-card { background: #fff; border: 1px solid #ddd; padding: 14px 20px; flex: 1; min-width: 130px; }
  .stat-card .num { font-size: 1.9em; font-weight: bold; line-height: 1; }
  .stat-card .lbl { font-size: 0.76em; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
  .stat-card.green .num { color: #2e7d32; }
  .stat-card.blue  .num { color: #1565c0; }
  .stat-card.orange .num { color: #e65100; }

  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; font-size: 0.88em; }
  thead tr { background: #1a1a1a; color: #fff; }
  thead th { padding: 9px 11px; text-align: left; font-weight: normal; font-size: 0.82em;
             text-transform: uppercase; letter-spacing: 0.04em; }
  tbody tr { border-bottom: 1px solid #eee; }
  tbody tr:hover { background: #f8f8f4; }
  tbody tr.finalized { background: #f0f7f0; }
  tbody td { padding: 8px 11px; }
  .badge { display: inline-block; padding: 2px 8px; font-size: 0.78em; border-radius: 2px; }
  .badge-done { background: #c8e6c9; color: #1b5e20; }
  .badge-prog { background: #fff9c4; color: #f57f17; }
  .badge-wait { background: #f5f5f5; color: #666; }
  .progress-mini { height: 6px; background: #eee; border-radius: 3px; width: 90px; display: inline-block; vertical-align: middle; }
  .progress-mini-fill { height: 100%; background: #81c784; border-radius: 3px; }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #last-update { font-size: 0.78em; color: #888; }
</style>
</head>
<body>

<header id="site-header">
  <img src="logo_unisannio.png" alt="Università degli Studi del Sannio — DST">
</header>

<!-- LOGIN -->
<div id="login-panel">
  <h1>Monitor Esame</h1>
  <p class="subtitle">Applicazioni di Bioinformatica — Genetica Umana — MedTec</p>
  <label for="pwd">Password amministratore</label>
  <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
  <div id="login-error"></div>
  <button class="btn" onclick="doLogin()">Accedi</button>
</div>

<!-- MONITOR -->
<div id="monitor-panel">
  <div class="monitor-header">
    <div>
      <h2>Monitor in tempo reale</h2>
      <div class="monitor-meta" id="monitor-meta">Seleziona una traccia</div>
    </div>
    <div class="controls">
      <button class="btn btn-sm" onclick="loadData()">↻ Aggiorna ora</button>
      <span id="last-update"></span>
      <button class="btn btn-sm btn-outline" onclick="logout()">Esci</button>
    </div>
  </div>

  <!-- Selettore traccia -->
  <div class="track-bar">
    <label style="margin:0;white-space:nowrap;font-size:0.88em;">Traccia:</label>
    <select id="track-select" onchange="onTrackChange()">
      <option value="">— seleziona —</option>
    </select>
    <span style="font-size:0.8em;color:#888;">Aggiornamento automatico ogni 30s</span>
  </div>

  <div class="stats-row">
    <div class="stat-card blue">  <div class="num" id="stat-total">—</div><div class="lbl">Connessi</div></div>
    <div class="stat-card orange"><div class="num" id="stat-prog">—</div> <div class="lbl">In corso</div></div>
    <div class="stat-card green"> <div class="num" id="stat-done">—</div> <div class="lbl">Consegnati</div></div>
  </div>

  <table id="monitor-table">
    <thead>
      <tr>
        <th>Matricola</th><th>Nominativo</th><th>Email</th>
        <th>Inizio</th><th>Fine</th><th>Durata</th>
        <th>Risposte</th><th>Voto</th><th>Stato</th>
      </tr>
    </thead>
    <tbody id="monitor-body">
      <tr><td colspan="9" style="text-align:center;padding:40px;color:#888;">Seleziona una traccia</td></tr>
    </tbody>
  </table>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyesj1cil3kNhPnjzAYIcaub8YeYbQ9sUY2yr5e4ClrM98-V5IPE-d9lgPXXjTa_hU8Mg/exec";
const N_QUESTIONS = 15;
let adminPassword = "";
let refreshTimer = null;
let currentExamId = "";
let allTracks = [];

async function callScript(payload) {
  const resp = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  });
  return resp.json();
}

async function doLogin() {
  const pwd = document.getElementById("pwd").value.trim();
  if (!pwd) { document.getElementById("login-error").textContent = "Inserisci la password."; return; }
  document.getElementById("login-error").textContent = "Verifica…";
  try {
    const res = await callScript({ action: "getAllTracks", password: pwd });
    if (res.status === "error") {
      document.getElementById("login-error").textContent = res.message || "Errore.";
      return;
    }
    adminPassword = pwd;
    allTracks = res.tracks || [];
    document.getElementById("login-panel").style.display = "none";
    document.getElementById("monitor-panel").classList.add("active");
    populateTrackSelect(allTracks);
    startAutoRefresh();
  } catch(e) {
    document.getElementById("login-error").textContent = "Errore di rete: " + e.message;
  }
}

function populateTrackSelect(tracks) {
  const sel = document.getElementById("track-select");
  sel.innerHTML = '<option value="">— seleziona traccia —</option>';
  // Mostra prima le tracce aperte, poi le chiuse
  const sorted = [...tracks].sort((a,b) => {
    if (a.status === b.status) return 0;
    return a.status === "open" ? -1 : 1;
  });
  sorted.forEach(t => {
    const opt = document.createElement("option");
    opt.value = t.exam_id;
    const statusIcon = t.status === "open" ? "▶ " : "■ ";
    const modeLbl = t.mode === "practice" ? " [esercitazione]" : "";
    const displayName = t.exam_name && t.exam_name.trim() ? t.exam_name : t.exam_id + " ⚠";
    opt.textContent = statusIcon + displayName + " — " + formatDateIt(t.exam_date) + modeLbl;
    sel.appendChild(opt);
  });
}

function onTrackChange() {
  currentExamId = document.getElementById("track-select").value;
  if (!currentExamId) {
    document.getElementById("monitor-meta").textContent = "Seleziona una traccia";
    document.getElementById("monitor-body").innerHTML =
      '<tr><td colspan="9" style="text-align:center;padding:40px;color:#888;">Seleziona una traccia</td></tr>';
    ["stat-total","stat-prog","stat-done"].forEach(id => document.getElementById(id).textContent = "—");
    return;
  }
  loadData();
}

async function loadData() {
  if (!currentExamId) return;
  try {
    const res = await callScript({ action: "getMonitor", password: adminPassword, examId: currentExamId });
    if (res.status === "ok") renderData(res);
    document.getElementById("last-update").textContent = new Date().toLocaleTimeString("it-IT");
  } catch(e) { console.error("Refresh error:", e); }
}

function renderData(res) {
  const track = res.track || {};
  const dateIt = formatDateIt(track.exam_date || "");
  const modeLbl = track.mode === "practice" ? " — esercitazione" : "";
  document.getElementById("monitor-meta").innerHTML =
    "<strong>" + (track.exam_name || track.exam_id || "—") + "</strong>" +
    (dateIt ? " &nbsp;|&nbsp; " + dateIt : "") + modeLbl +
    " &nbsp;|&nbsp; <code style='font-size:0.85em'>" + (track.exam_id || "—") + "</code>";

  const rows = res.rows || [];
  const done = rows.filter(r => r.finalized).length;
  document.getElementById("stat-total").textContent = rows.length;
  document.getElementById("stat-prog").textContent  = rows.length - done;
  document.getElementById("stat-done").textContent  = done;

  const tbody = document.getElementById("monitor-body");
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:#888;">Nessuno studente ancora connesso</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => {
    const pct = Math.round((r.answered / N_QUESTIONS) * 100);
    const badge = r.finalized
      ? '<span class="badge badge-done">Consegnato</span>'
      : r.answered > 0
        ? '<span class="badge badge-prog">In corso</span>'
        : '<span class="badge badge-wait">Connesso</span>';
    const score = r.finalized && r.score !== "" ? r.score + "/30" : "—";
    return `<tr class="${r.finalized ? "finalized" : ""}">
      <td>${escHtml(String(r.matricola))}</td>
      <td>${escHtml(String(r.nominativo||""))}</td>
      <td>${escHtml(String(r.email||""))}</td>
      <td>${r.tsStart||"—"}</td>
      <td>${r.finalized ? (r.tsEnd||"—") : "—"}</td>
      <td>${r.finalized ? escHtml(String(r.elapsed||"")) : "—"}</td>
      <td><span style="margin-right:6px;">${r.answered}/${N_QUESTIONS}</span>
          <span class="progress-mini"><span class="progress-mini-fill" style="width:${pct}%"></span></span></td>
      <td>${score}</td>
      <td>${badge}</td>
    </tr>`;
  }).join("");
}

function formatDateIt(dateStr) {
  if (!dateStr) return "";
  const mesi = ["gennaio","febbraio","marzo","aprile","maggio","giugno",
                "luglio","agosto","settembre","ottobre","novembre","dicembre"];
  const m = String(dateStr).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return dateStr;
  return parseInt(m[3]) + " " + (mesi[parseInt(m[2])-1] || m[2]) + " " + m[1];
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadData, 30000);
}

function logout() {
  if (refreshTimer) clearInterval(refreshTimer);
  adminPassword = ""; currentExamId = "";
  document.getElementById("monitor-panel").classList.remove("active");
  document.getElementById("login-panel").style.display = "";
  document.getElementById("pwd").value = "";
  document.getElementById("login-error").textContent = "";
}
</script>
</body>
</html>
