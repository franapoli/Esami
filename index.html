<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Applicazioni di Bioinformatica</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #f5f5f0; color: #1a1a1a; }

  /* COVER */
  #cover { max-width: 560px; margin: 60px auto; padding: 40px; background: #fff; border: 1px solid #ddd; }
  h1 { font-size: 1.4em; font-weight: bold; margin-bottom: 6px; }
  .subtitle { color: #555; font-size: 0.95em; margin-bottom: 32px; }
  label { display: block; font-size: 0.9em; color: #333; margin-bottom: 4px; margin-top: 16px; }
  input[type=text] { width: 100%; padding: 8px 10px; border: 1px solid #bbb; font-size: 1em; font-family: inherit; }
  .btn { display: inline-block; margin-top: 24px; padding: 10px 28px; background: #1a1a1a; color: #fff; border: none; font-size: 1em; font-family: inherit; cursor: pointer; }
  .btn:hover { background: #333; }
  .btn:disabled { background: #999; cursor: not-allowed; }
  #cover-error { color: #b00; font-size: 0.88em; margin-top: 10px; min-height: 1.2em; }

  /* QUIZ LAYOUT */
  #quiz-wrapper { display: none; max-width: 1100px; margin: 30px auto; padding: 0 16px; gap: 24px; display: none; align-items: flex-start; }
  #quiz-wrapper.active { display: flex; }

  /* SIDEBAR */
  #sidebar { width: 210px; flex-shrink: 0; background: #fff; border: 1px solid #ddd; padding: 20px 16px; position: sticky; top: 24px; }
  #sidebar h2 { font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em; color: #777; margin-bottom: 12px; }
  #student-info { font-size: 0.88em; line-height: 1.6; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #eee; }
  #student-info strong { display: block; }
  .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .q-dot { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.78em; font-weight: bold; border: 2px solid #ddd; cursor: pointer; transition: all 0.15s; color: #555; background: #fff; }
  .q-dot:hover { background: #f0f0e8; }
  .q-dot.answered { background: #c8e6c9; border-color: #81c784; color: #1b5e20; }
  .q-dot.current { border-color: #1a1a1a; border-width: 2px; background: #e8e8e0; }
  .q-dot.answered.current { border-color: #1a1a1a; }
  #save-status { font-size: 0.75em; color: #888; margin-top: 14px; min-height: 1em; }

  /* MAIN QUIZ AREA */
  #quiz-main { flex: 1; background: #fff; border: 1px solid #ddd; padding: 36px 40px; }
  #progress-label { font-size: 0.82em; color: #777; margin-bottom: 6px; }
  #progress-bar-wrap { background: #eee; height: 4px; margin-bottom: 28px; }
  #progress-bar { background: #1a1a1a; height: 4px; transition: width 0.3s; }
  .q-number { font-size: 0.82em; color: #777; margin-bottom: 6px; }
  .q-points { font-size: 0.82em; color: #777; margin-left: 8px; }
  .q-text { font-size: 1.05em; line-height: 1.65; margin-bottom: 22px; }
  .blast-block { background: #f8f8f8; border: 1px solid #ddd; padding: 12px 14px; font-family: monospace; font-size: 0.78em; line-height: 1.5; overflow-x: auto; margin-bottom: 20px; white-space: pre; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border: 1px solid #ddd; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; }
  .option:hover { background: #f5f5f0; }
  .option.selected { background: #e8e8e0; border-color: #999; }
  .option input[type=radio] { margin-top: 3px; flex-shrink: 0; }
  .option-label { font-size: 0.95em; line-height: 1.5; }
  .fitb-input { width: 100%; padding: 9px 12px; border: 1px solid #bbb; font-size: 1em; font-family: monospace; margin-top: 4px; }
  .fitb-hint { font-size: 0.82em; color: #777; margin-top: 6px; }
  .nav { display: flex; justify-content: space-between; margin-top: 28px; }
  .acmg-table { width: 100%; border-collapse: collapse; font-size: 0.88em; margin-bottom: 20px; }
  .acmg-table th { text-align: left; padding: 6px 8px; border-bottom: 2px solid #ddd; background: #f8f8f8; }
  .acmg-table td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: top; }

  /* THANK YOU */
  #thankyou { display: none; max-width: 780px; margin: 40px auto; padding: 40px; background: #fff; border: 1px solid #ddd; }
  #score-display { font-size: 2em; font-weight: bold; margin: 16px 0 8px; }
  #score-detail { font-size: 0.9em; color: #555; margin-bottom: 24px; }
  #send-status { margin-top: 12px; font-size: 0.9em; }
  table.result { width: 100%; border-collapse: collapse; font-size: 0.88em; margin-top: 16px; }
  table.result th { text-align: left; padding: 6px 8px; border-bottom: 2px solid #ddd; }
  table.result td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: top; }
  td.correct { color: #2a7a2a; }
  td.wrong { color: #b00; }
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <h1>Quiz — Applicazioni di Bioinformatica</h1>
  <p class="subtitle">Genetica Umana &middot; MedTec &nbsp;|&nbsp; 15 domande &nbsp;|&nbsp; 30 punti &nbsp;|&nbsp; ~60 minuti</p>
  <p id="cover-date" style="font-size:0.95em;color:#1a1a1a;margin-top:4px;font-weight:bold;"></p>
  <label for="nome">Nome e cognome</label>
  <input type="text" id="nome" placeholder="Es. Mario Rossi">
  <label for="matricola">Matricola</label>
  <input type="text" id="matricola" placeholder="Es. 123456">
  <p style="font-size:0.85em;color:#777;margin-top:20px;">Inserisci i tuoi dati e clicca Inizia. La tua sessione viene registrata immediatamente.</p>
  <div id="cover-error"></div>
  <button class="btn" id="btn-start" onclick="initQuiz()">Inizia il quiz</button>
</div>

<!-- QUIZ -->
<div id="quiz-wrapper">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2>Studente</h2>
    <div id="student-info"></div>
    <h2>Domande</h2>
    <div class="q-grid" id="q-grid"></div>
    <div id="save-status"></div>
    <button class="btn" style="width:100%;margin-top:20px;background:#b00;" onclick="confirmSubmit()">Consegna</button>
  </div>
  <!-- MAIN -->
  <div id="quiz-main">
    <div id="progress-label"></div>
    <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>
    <div id="question-container"></div>
    <div class="nav">
      <button class="btn" id="btn-prev" onclick="prevQ()" style="background:#888">&#8592; Precedente</button>
      <button class="btn" id="btn-next" onclick="nextQ()">Avanti &#8594;</button>
    </div>
  </div>
</div>

<!-- THANK YOU -->
<div id="thankyou">
  <h1>Quiz completato</h1>
  <p style="color:#555;font-size:0.95em;margin-top:12px;">Il tuo quiz è stato consegnato. Puoi chiudere questa pagina.</p>
  <div id="send-status"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyesj1cil3kNhPnjzAYIcaub8YeYbQ9sUY2yr5e4ClrM98-V5IPE-d9lgPXXjTa_hU8Mg/exec";
const EXAM_DATE = "2026-05-28";

// Mostra data in copertina
document.getElementById("cover-date").textContent = "Esame del " + EXAM_DATE;

let startTime = null;

const BLAST_OUTPUT = `Query: NP_000542.1 VHL protein isoform 1 [Homo sapiens]

                                                             Score    E
Sequences producing significant alignments:                 (Bits)  Value

NP_000542.1   VHL protein isoform 1 [Homo sapiens]           436    2e-155
XP_016799693.1  VHL disease protein [Pan troglodytes]         434    4e-154
XP_008974688.1  VHL disease protein [Mus musculus]            388    3e-136
XP_015147021.1  VHL protein [Danio rerio]                     278    2e-94
XP_033058812.1  VHL protein [Drosophila melanogaster]          52    7e-08
hypothetical protein [uncultured bacterium]                    18    0.6

> XP_015147021.1  VHL protein [Danio rerio]  Length=213
  Score = 278 bits, Expect = 2e-94
  Identities = 149/213 (70%), Positives = 175/213 (82%), Gaps = 1/213 (0%)`;

const questions = [
  { id:1, pts:2, type:"mc",
    text:"Un ricercatore deve confrontare una nuova sequenza proteica con un database di milioni di proteine. Quale approccio e' piu' appropriato?",
    options:["Algoritmo esatto di programmazione dinamica, perche' garantisce il risultato ottimale","Algoritmo euristico come BLAST, perche' offre un compromesso praticabile tra velocita' e sensibilita' su grandi database","Distanza di Hamming, perche' e' piu' veloce della edit distance","Smith-Waterman applicato a tutte le sequenze del database, perche' l'allineamento locale e' sempre superiore a quello globale"],
    correct:1 },
  { id:2, pts:2, type:"mc",
    text:"In BLAST, se il parametro W (lunghezza del seed) viene aumentato da 3 a 5, qual e' l'effetto atteso?",
    options:["La ricerca diventa piu' lenta ma piu' sensibile","La ricerca diventa piu' veloce ma meno sensibile alle sequenze molto divergenti","L'E-value di ogni hit diminuisce proporzionalmente","Il numero di falsi positivi aumenta"],
    correct:1 },
  { id:3, pts:2, type:"mc",
    text:"Nel database gnomAD, un gene ha pLI = 0.99. Qual e' l'interpretazione corretta?",
    options:["Il 99% delle varianti nel gene sono patogeniche","Il gene e' sotto forte pressione selettiva contro varianti che ne eliminano la funzione","La frequenza allelica media nel gene e' del 99% nella popolazione generale","Il 99% degli individui nel database porta almeno una variante nel gene"],
    correct:1 },
  { id:4, pts:2, type:"mc",
    text:"Nell'allineamento globale di Needleman-Wunsch, cosa rappresenta il valore nella cella in basso a destra della matrice DP?",
    options:["La edit distance tra le due sequenze","Lo score dell'allineamento locale ottimale","Lo score dell'allineamento globale ottimale","La lunghezza della sottosequenza comune piu' lunga (LCS)"],
    correct:2 },
  { id:5, pts:2, type:"mc",
    text:"In RNA-seq, qual e' il vantaggio della normalizzazione TPM rispetto a RPKM?",
    options:["E' piu' veloce da calcolare computazionalmente","Rende i valori direttamente confrontabili tra campioni diversi, poiche' la somma dei TPM e' costante per campione","Non richiede la stima della lunghezza del trascritto","Elimina completamente l'effetto della coverage"],
    correct:1 },
  { id:6, pts:2, type:"mc",
    text:"Una variante identificata in un paziente con una malattia dominante rara (prevalenza 1/50.000) ha una frequenza allelica del 4% in gnomAD. Quale conclusione e' piu' ragionevole?",
    options:["La variante e' probabilmente causativa, perche' e' rara nella popolazione generale","La variante e' quasi certamente benigna, perche' la sua frequenza nella popolazione sana e' incompatibile con la malattia","La variante e' di significato incerto perche' non ci sono abbastanza dati","La variante e' patogenica con penetranza ridotta"],
    correct:1 },
  { id:7, pts:2, type:"mc",
    text:"Il framework ACMG/AMP e' stato sviluppato principalmente per:",
    options:["Calcolare automaticamente la patogenicita' di qualsiasi variante tramite algoritmo deterministico","Standardizzare il linguaggio e i criteri di classificazione tra laboratori di genetica clinica","Sostituire l'analisi clinica con un sistema di punteggio basato solo su dati di popolazione","Classificare esclusivamente le varianti somatiche nei tumori"],
    correct:1 },
  { id:8, pts:3, type:"fitb",
    text:"Nel confronto tra un frammento del gene VHL e un omologo in un'altra specie vengono estratti: Sequenza 1 = ATGCTC (colonne) · Sequenza 2 = ACTG (righe). Operazioni ammesse: inserzione, delezione, sostituzione (costo 1 ciascuna). Riporta i valori dell'ultima colonna della matrice DP (riga 0 → riga 4), separati da virgola.",
    correct:"6,5,4,3,3", placeholder:"es. 0,1,2,3,4" },
  { id:9, pts:1, type:"mc", blast:true,
    text:"Output blastp — VHL umana vs RefSeq nr. Quale hit deve essere scartato perche' non statisticamente significativo?",
    options:["VHL protein — Drosophila melanogaster","hypothetical protein — uncultured bacterium","VHL protein — Danio rerio","VHL disease protein — Pan troglodytes"],
    correct:1 },
  { id:10, pts:2, type:"mc", blast:true,
    text:"Nell'allineamento con Danio rerio: Identities = 149/213 (70%), Positives = 175/213 (82%). La differenza tra i due valori indica che:",
    options:["26 posizioni hanno un gap nell'allineamento","26 posizioni hanno aminoacidi diversi ma con proprieta' fisico-chimiche simili, che la matrice di sostituzione considera conservative","Il 12% della sequenza di zebrafish non e' allineata alla sequenza umana","BLAST ha trovato 26 allineamenti alternativi con score diverso"],
    correct:1 },
  { id:11, pts:1, type:"mc", blast:true,
    text:"Nell'output BLAST, Mus musculus ha Score = 388 bits ed E-value = 3e-136, mentre Danio rerio ha Score = 278 bits ed E-value = 2e-94. Quale affermazione e' corretta?",
    options:["L'allineamento con il topo e' piu' significativo perche' ha E-value piu' basso e score piu' alto","L'allineamento con lo zebrafish e' piu' significativo perche' ha E-value piu' basso","I due allineamenti sono equivalenti perche' entrambi significativi","L'allineamento con lo zebrafish e' preferibile perche' ha un numero di Gaps inferiore"],
    correct:0 },
  { id:12, pts:2, type:"mc",
    text:"Cerca su ClinVar la variante NM_000551.4(VHL):c.500G>A (identificatore VCV000002216). Qual e' la classificazione clinica attuale e il livello di revisione?",
    options:["Pathogenic — no assertion criteria provided","Likely pathogenic — reviewed by expert panel","Pathogenic — reviewed by expert panel","Variant of uncertain significance — single submitter"],
    correct:2 },
  { id:13, pts:2, type:"mc",
    text:"Cerca l'entry P40337 (proteina VHL umana). In quale dominio funzionale cade il residuo Arg167, e come viene classificata la variante p.Arg167Gln nella sezione delle varianti patologiche?",
    options:["Dominio VHL box; variante associata a perdita di funzione","Dominio di legame con Elongin BC; variante associata a VHL disease tipo II e feocromocitoma","Dominio RING finger; variante associata a carcinoma renale sporadico","Regione C-terminale; variante di significato incerto"],
    correct:1 },
  { id:14, pts:3, type:"mc",
    acmg: true,
    text:"Variante VHL p.Arg167Gln. Evidenze disponibili: 2 Strong (studi funzionali + casistica), 2 Moderate (hotspot + codone noto), 2 Supporting (gnomAD + in silico). Applicando lo schema fornito, quale classificazione e' corretta?",
    options:["VUS — le evidenze Strong non sono sufficienti senza un criterio Very Strong","Probably Pathogenic — Strong + Moderate + Supporting soddisfa LP ma non P","Pathogenic — la combinazione di evidenze soddisfa la soglia Patogenica","Probably Pathogenic — i criteri Strong si annullano in assenza di conferma de novo"],
    correct:2 },
  { id:15, pts:2, type:"mc",
    text:"Se i test familiari confermassero che entrambi i genitori non portano la variante (de novo confermato), questo nuovo dato aggiungerebbe un'evidenza di peso:",
    options:["Supporting — la classificazione finale salirebbe da LP a P","Moderate — la classificazione non cambierebbe","Strong — la classificazione rimarrebbe Patogenica, con un'evidenza Strong aggiuntiva","Very Strong — la variante verrebbe riclassificata con certezza assoluta"],
    correct:2 }
];

const ACMG_SCHEMA = `<table class="acmg-table">
<tr><th>Classificazione</th><th>Combinazione minima richiesta</th></tr>
<tr><td>Patogenica</td><td>1 Very Strong + 1 Strong, oppure 2 Strong, oppure 1 Strong + 3 Moderate, oppure &hellip;</td></tr>
<tr><td>Prob. Patogenica</td><td>1 Very Strong + 1 Moderate, oppure 1 Strong + 1 Moderate + 1 Supporting, oppure 2 Moderate + 2 Supporting, oppure &hellip;</td></tr>
<tr><td>VUS</td><td>Evidenze insufficienti o in conflitto</td></tr>
</table>`;

let current = 0;
let answers = new Array(questions.length).fill(null);
let studentNome = "";
let studentMatricola = "";

const LS_KEY = "quiz_session_" + EXAM_DATE;

// ---- LOCALSTORAGE ----
function saveLocal() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    nome: studentNome,
    matricola: studentMatricola,
    answers,
    current,
    startTime: startTime ? startTime.toISOString() : null
  }));
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function clearLocal() {
  localStorage.removeItem(LS_KEY);
}

// ---- AUTO-RESTORE on page load ----
window.addEventListener("load", function() {
  const saved = loadLocal();
  if (!saved) return;
  const resume = confirm("Trovata una sessione in corso per " + saved.nome + " (" + saved.matricola + ").\nVuoi riprendere da dove avevi lasciato?");
  if (!resume) { clearLocal(); return; }
  studentNome = saved.nome;
  studentMatricola = saved.matricola;
  answers = saved.answers || new Array(questions.length).fill(null);
  current = saved.current || 0;
  startTime = saved.startTime ? new Date(saved.startTime) : new Date();
  document.getElementById("cover").style.display = "none";
  document.getElementById("quiz-wrapper").classList.add("active");
  document.getElementById("student-info").innerHTML = "<strong>" + studentNome + "</strong><br>" + studentMatricola;
  buildGrid();
  renderQuestion();
});

// ---- INIT ----
async function initQuiz() {
  const nome = document.getElementById("nome").value.trim();
  const matricola = document.getElementById("matricola").value.trim();
  if (!nome || !matricola) {
    document.getElementById("cover-error").textContent = "Inserisci nome e matricola.";
    return;
  }
  const btn = document.getElementById("btn-start");
  btn.disabled = true;
  btn.textContent = "Verifica in corso…";
  document.getElementById("cover-error").textContent = "";

  try {
    const res = await callScript({ action:"init", nome, matricola, examDate: EXAM_DATE });
    if (res.status === "duplicate") {
      document.getElementById("cover-error").textContent = "Matricola gia registrata. Contatta il docente.";
      btn.disabled = false;
      btn.textContent = "Inizia il quiz";
      return;
    }
    studentNome = nome;
    studentMatricola = matricola;
    startTime = new Date();
    saveLocal();
    document.getElementById("cover").style.display = "none";
    document.getElementById("quiz-wrapper").classList.add("active");
    document.getElementById("student-info").innerHTML = "<strong>" + nome + "</strong><br>" + matricola;
    buildGrid();
    renderQuestion();
  } catch(err) {
    document.getElementById("cover-error").textContent = "Errore di connessione. Riprova.";
    btn.disabled = false;
    btn.textContent = "Inizia il quiz";
  }
}

// ---- GRID ----
function buildGrid() {
  const grid = document.getElementById("q-grid");
  grid.innerHTML = "";
  questions.forEach((q, i) => {
    const d = document.createElement("div");
    d.className = "q-dot" + (i===0?" current":"");
    d.id = "dot-" + i;
    d.textContent = q.id;
    d.onclick = () => jumpTo(i);
    grid.appendChild(d);
  });
}

function updateGrid() {
  questions.forEach((q, i) => {
    const d = document.getElementById("dot-" + i);
    if (!d) return;
    d.className = "q-dot" + (answers[i] !== null ? " answered" : "") + (i === current ? " current" : "");
  });
}

function jumpTo(i) {
  current = i;
  renderQuestion();
}

// ---- RENDER ----
function renderQuestion() {
  const q = questions[current];
  const total = questions.length;
  document.getElementById("progress-label").textContent = "Domanda " + (current+1) + " di " + total;
  document.getElementById("progress-bar").style.width = (((current+1)/total)*100) + "%";

  let html = "<div class='q-number'>Domanda " + q.id + " <span class='q-points'>[" + q.pts + " pt]</span></div>";

  if (q.acmg) html += ACMG_SCHEMA;
  if (q.blast) html += "<div class='blast-block'>" + BLAST_OUTPUT + "</div>";

  html += "<div class='q-text'>" + q.text + "</div>";

  if (q.type === "mc") {
    q.options.forEach((opt, i) => {
      const sel = answers[current] === i ? " selected" : "";
      html += "<div class='option" + sel + "' onclick='selectOption(" + i + ")'><input type='radio' name='q'" + (answers[current]===i?" checked":"") + " readonly><span class='option-label'>" + opt + "</span></div>";
    });
  } else if (q.type === "fitb") {
    const val = answers[current] !== null ? answers[current] : "";
    html += "<input class='fitb-input' type='text' id='fitb-input' value='" + val + "' placeholder='" + q.placeholder + "' oninput='saveText(this.value)'><p class='fitb-hint'>Inserisci i 5 valori separati da virgola, senza spazi (es. 0,1,2,3,4)</p>";
  }

  document.getElementById("question-container").innerHTML = html;
  document.getElementById("btn-prev").style.visibility = current === 0 ? "hidden" : "visible";
  document.getElementById("btn-next").style.visibility = current === total-1 ? "hidden" : "visible";
  updateGrid();
}

function selectOption(i) {
  answers[current] = i;
  saveLocal();
  saveProgress(current, i);
  renderQuestion();
}

function saveText(val) {
  answers[current] = val.trim();
  saveLocal();
  saveProgress(current, val.trim());
}

// ---- NAV ----
function nextQ() {
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  }
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}

function confirmSubmit() {
  const answered = answers.filter(a => a !== null).length;
  const total = questions.length;
  const unanswered = total - answered;
  let msg = "Hai risposto a " + answered + " domande su " + total + ".";
  if (unanswered > 0) msg += "\n\n" + unanswered + " domanda/e senza risposta verrà considerata errata.";
  msg += "\n\nConfermi la consegna?";
  if (confirm(msg)) showResults();
}

// ---- SAVE PROGRESS ----
function setSaveStatus(msg) {
  document.getElementById("save-status").textContent = msg;
}

async function saveProgress(qIndex, value) {
  setSaveStatus("Salvataggio…");
  try {
    await callScript({ action:"update", matricola: studentMatricola, qIndex: qIndex+1, value: String(value) });
    setSaveStatus("✓ Salvato");
  } catch(e) {
    setSaveStatus("⚠ Salvataggio fallito");
  }
}

// ---- RESULTS ----
function normalizeAnswer(ans) {
  if (ans === null || ans === undefined) return "";
  return String(ans).replace(/\s/g,"").toLowerCase();
}

async function showResults() {
  document.getElementById("quiz-wrapper").classList.remove("active");
  document.getElementById("thankyou").style.display = "block";

  let score = 0;
  const resultRows = [];

  questions.forEach((q, i) => {
    let userAns = answers[i];
    let correct = false;
    if (q.type === "mc") correct = userAns === q.correct;
    else if (q.type === "fitb") correct = normalizeAnswer(userAns) === normalizeAnswer(q.correct);
    score += correct ? q.pts : 0;
    const userDisplay = q.type === "mc" ? (userAns !== null ? q.options[userAns] : "—") : (userAns || "—");
    resultRows.push(userDisplay);
  });

  const endTime = new Date();
  const elapsed = startTime ? Math.round((endTime - startTime) / 1000) : null;
  const elapsedStr = elapsed !== null
    ? Math.floor(elapsed/60) + "m " + (elapsed%60) + "s"
    : "";

  document.getElementById("send-status").textContent = "Salvataggio in corso…";
  try {
    await callScript({
      action: "finalize",
      matricola: studentMatricola,
      examDate: EXAM_DATE,
      score,
      answers: resultRows,
      tsStart: startTime ? startTime.toISOString() : "",
      tsEnd: endTime.toISOString(),
      elapsed: elapsedStr
    });
    clearLocal();
    document.getElementById("send-status").textContent = "✓ Consegna registrata.";
  } catch(e) {
    document.getElementById("send-status").textContent = "⚠ Errore nel salvataggio. Mostra questa pagina al docente.";
  }
}

// ---- HTTP ----
function callScript(payload) {
  return fetch(SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload)
  }).then(r => r.json());
}
</script>
